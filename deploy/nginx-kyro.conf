# Kyro analytics dashboard — static site served from the publish webroot.
# Only index.html, dashboard_data.js and assets/ live in webroot; the raw
# threads/ archive and user-info.sql are NOT there and are never web-exposed.
#
# Install:  sudo cp deploy/nginx-kyro.conf /etc/nginx/conf.d/kyro.conf
#           sudo nginx -t && sudo systemctl enable --now nginx
server {
    listen 80 default_server;
    server_name _;

    root /home/ubuntu/kyro-dashboard/webroot;
    index index.html;

    # regenerated hourly — don't let browsers cache a stale copy
    location = /dashboard_data.js {
        add_header Cache-Control "no-store";
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # --- STRONGLY RECOMMENDED for prod data: require a login ---
    # sudo dnf install -y httpd-tools        # (Ubuntu: apache2-utils)
    # sudo htpasswd -c /etc/nginx/.htpasswd <user>
    # then uncomment:
    # auth_basic           "Kyro Analytics";
    # auth_basic_user_file /etc/nginx/.htpasswd;
}
