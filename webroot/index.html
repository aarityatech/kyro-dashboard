<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kyro Analytics — Thread Insights</title>
<script src="assets/chart.umd.min.js"></script>
<script src="assets/wordcloud2.min.js"></script>
<script src="assets/dashboard_calc.js"></script>
<script src="dashboard_data.js"></script>
<style>
  :root{
    --bg:#0b1020; --bg2:#121a30; --card:#151d36; --card2:#1b2545;
    --line:#27314f; --txt:#e6ebf5; --muted:#93a0bd; --muted2:#6b7796;
    --accent:#36d399; --accent2:#22d3ee; --warn:#fbbf24; --bad:#f87171; --good:#34d399;
    --p1:#36d399; --p2:#22d3ee; --p3:#818cf8; --p4:#f472b6; --p5:#fbbf24;
    --p6:#fb923c; --p7:#a78bfa; --p8:#4ade80; --p9:#60a5fa; --p10:#f87171;
    --radius:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
  a{color:var(--accent2)}
  .topbar{position:sticky;top:0;z-index:30;background:linear-gradient(180deg,#0d1430,#0b1020);
    border-bottom:1px solid var(--line);padding:14px 22px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:12px}
  .logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:grid;place-items:center;font-weight:800;color:#06241b;font-size:17px}
  .brand h1{font-size:16px;margin:0;font-weight:700;letter-spacing:.2px}
  .brand .sub{font-size:11.5px;color:var(--muted);margin-top:1px}
  .scope{margin-left:auto;display:flex;gap:18px;flex-wrap:wrap;font-size:12px;color:var(--muted)}
  .scope b{color:var(--txt);font-weight:600}
  .scopetoggle{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;margin-left:14px}
  .scopetoggle button{background:transparent;border:none;color:var(--muted);padding:7px 11px;font-size:11.5px;font-weight:700;cursor:pointer;white-space:nowrap}
  .scopetoggle button.on{background:var(--card2);color:var(--txt)}
  .scopetoggle button:hover{color:var(--txt)}
  .scopetoggle button:first-child{border-right:1px solid var(--line)}
  .dlbtn{margin-left:14px;display:flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:9px;background:transparent;color:var(--muted);padding:7px 12px;font-size:11.5px;font-weight:700;cursor:pointer;white-space:nowrap}
  .dlbtn:hover{color:var(--txt);border-color:var(--txt)}
  .dlbtn:disabled{opacity:.5;cursor:default}
  .filters{display:flex;align-items:center;gap:12px;flex-wrap:wrap;font-size:11.5px;color:var(--muted);margin-left:10px}
  .filters label{display:flex;align-items:center;gap:6px;font-weight:600;white-space:nowrap}
  .filters input[type=date],.filters select{background:var(--bg2);border:1px solid var(--line);color:var(--txt);
    border-radius:8px;padding:5px 8px;font-size:12px;font-family:inherit;color-scheme:dark;max-width:200px}
  .filters button{background:var(--card2);border:1px solid var(--line);color:var(--muted);border-radius:8px;
    padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer}
  .filters button:hover{color:var(--txt)}
  .filterchip{background:rgba(129,140,248,.15);color:var(--p3);padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:700}
  .tabs{display:flex;gap:4px;padding:10px 16px 0;background:var(--bg);
    border-bottom:1px solid var(--line);position:sticky;top:64px;z-index:20;overflow-x:auto}
  .tab{padding:9px 15px;border:none;background:transparent;color:var(--muted);cursor:pointer;
    font-size:13px;font-weight:600;border-radius:9px 9px 0 0;white-space:nowrap;border-bottom:2px solid transparent}
  .tab:hover{color:var(--txt)}
  .tab.active{color:var(--txt);background:var(--card);border-bottom:2px solid var(--accent)}
  main{padding:22px;max-width:1500px;margin:0 auto}
  .panel{display:none}
  .panel.active{display:block;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .grid{display:grid;gap:16px}
  .g2{grid-template-columns:repeat(2,1fr)}
  .g3{grid-template-columns:repeat(3,1fr)}
  .g4{grid-template-columns:repeat(4,1fr)}
  @media(max-width:1100px){.g3,.g4{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:680px){.g2,.g3,.g4{grid-template-columns:1fr}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px}
  .card h3{margin:0 0 2px;font-size:13.5px;font-weight:700}
  .card .desc{font-size:11.5px;color:var(--muted2);margin:0 0 12px}
  .span2{grid-column:span 2}.span3{grid-column:span 3}.span4{grid-column:span 4}
  @media(max-width:1100px){.span3,.span4{grid-column:span 2}}
  @media(max-width:680px){.span2,.span3,.span4{grid-column:span 1}}
  /* KPI */
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:15px 16px;position:relative;overflow:hidden}
  .kpi .label{font-size:11.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
  .kpi .val{font-size:27px;font-weight:800;margin-top:6px;line-height:1.05}
  .kpi .foot{font-size:11.5px;color:var(--muted2);margin-top:4px}
  .kpi .bar{position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent)}
  .kpi.na{opacity:.92}
  .kpi.na .val{color:var(--muted)}
  .kpi.warn .bar{background:var(--warn)} .kpi.bad .bar{background:var(--bad)} .kpi.cy .bar{background:var(--accent2)}
  .kpi.pp .bar{background:var(--p3)} .kpi.pk .bar{background:var(--p4)}
  .chart-wrap{position:relative;height:300px}
  .chart-wrap.tall{height:360px}
  .chart-wrap.short{height:240px}
  canvas.wc{width:100%;height:380px;display:block}
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);white-space:nowrap}
  th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.3px;cursor:pointer;user-select:none}
  th:hover{color:var(--txt)}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  tbody tr:hover{background:var(--card2)}
  .scroll{max-height:430px;overflow:auto;border-radius:10px;border:1px solid var(--line)}
  .scroll table th{position:sticky;top:0;background:var(--bg2);z-index:1}
  .tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:600;background:var(--card2);color:var(--muted)}
  .pill{padding:1px 7px;border-radius:6px;font-size:10.5px;font-weight:700}
  .pill.done{background:rgba(52,211,153,.15);color:var(--good)}
  .pill.cancelled{background:rgba(251,191,36,.15);color:var(--warn)}
  .pill.errored{background:rgba(248,113,113,.15);color:var(--bad)}
  .note{background:linear-gradient(90deg,rgba(251,191,36,.08),transparent);border:1px solid rgba(251,191,36,.25);
    border-left:3px solid var(--warn);border-radius:10px;padding:11px 14px;font-size:12.5px;color:#e9d8a6;margin-bottom:16px}
  .note b{color:#fde68a}
  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11.5px;color:var(--muted);margin-top:8px}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  .dot{width:9px;height:9px;border-radius:3px;display:inline-block}
  .filterbox{width:100%;padding:8px 11px;background:var(--bg2);border:1px solid var(--line);border-radius:9px;
    color:var(--txt);font-size:12.5px;margin-bottom:10px}
  .sec-title{font-size:12px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin:6px 2px 2px}
  .big{font-size:34px;font-weight:800}
  .inline-stats{display:flex;gap:20px;flex-wrap:wrap;margin-top:6px}
  .inline-stats div .n{font-size:20px;font-weight:800}
  .inline-stats div .l{font-size:11px;color:var(--muted)}
  .qtext{white-space:normal;max-width:520px;color:var(--txt)}
  .uid{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--muted2)}
  .qrow{cursor:pointer}
  .qrow .caret{display:inline-block;transition:transform .15s;color:var(--muted);font-size:11px}
  .qrow.open .caret{transform:rotate(90deg)}
  .qrow.open{background:var(--card2)}
  .qdetail>td{background:var(--bg2);padding:0;border-bottom:2px solid var(--line)}
  .transcript{padding:12px 16px;display:flex;flex-direction:column;gap:7px;max-height:440px;overflow:auto}
  .ti{border-left:3px solid var(--line);padding:6px 11px;border-radius:0 8px 8px 0;background:var(--card)}
  .ti.reason{border-color:var(--p7)} .ti.tool{border-color:var(--p2)} .ti.resp{border-color:var(--p1)}
  .ti .lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
  .ti.reason .lbl{color:var(--p7)} .ti.tool .lbl{color:var(--p2)} .ti.resp .lbl{color:var(--p1)}
  .ti .body{font-size:12px;color:var(--txt);white-space:pre-wrap;margin-top:3px;line-height:1.5;word-break:break-word}
  .ti.reason .body{color:var(--muted);font-style:italic}
  .ti code{font-family:ui-monospace,Menlo,monospace;font-size:11px;background:var(--bg);padding:2px 6px;border-radius:5px;color:var(--accent2);white-space:pre-wrap;word-break:break-word;display:block;margin-top:2px}
  .ti .meta{font-size:10px;color:var(--muted2);font-weight:600}
  .empty-tr{color:var(--muted2);font-size:12px;padding:12px 16px}
  .tr-sep{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin:8px 0 2px;padding-top:8px;border-top:1px dashed var(--line)}
  .tr-more{font-size:11.5px;color:var(--accent2);font-style:italic;padding:5px 2px 2px}
  footer{color:var(--muted2);font-size:11.5px;text-align:center;padding:26px}
  .empty{color:var(--muted2);font-size:12.5px;padding:20px;text-align:center}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">
    <div class="logo">K</div>
    <div>
      <h1>Kyro Analytics</h1>
      <div class="sub">Agentic thread insights · trading assistant</div>
    </div>
  </div>
  <div class="scope" id="scopeBar"></div>
  <button class="dlbtn" id="dlBtn" title="Download the raw data file for the current scope">⬇ Download data</button>
</div>

<nav class="tabs" id="tabs"></nav>

<main id="main"></main>

<footer id="footer"></footer>

<script>
// ============================================================ data + utils
// RAW payloads ship per-turn records; buildData (assets/dashboard_calc.js)
// recomputes every aggregate client-side so the date/persona filters work.
const RAW = window.DASHBOARD_DATA;
const CALCOK = (typeof window.KyroCalc!=='undefined');
if(!RAW || !CALCOK){ document.body.innerHTML='<p style="padding:40px">dashboard_data.js / assets/dashboard_calc.js not found. Run <code>python3 build_dashboard.py</code> first.</p>'; }
let D = null;   // current aggregated view (rebuilt on every filter change)
const LIBOK = (typeof Chart!=='undefined');

const PAL=['#36d399','#22d3ee','#818cf8','#f472b6','#fbbf24','#fb923c','#a78bfa','#4ade80','#60a5fa','#f87171','#2dd4bf','#c084fc'];
const $ = (s,r=document)=>r.querySelector(s);
const fmt = n => (n==null)?'—':n.toLocaleString('en-IN');
const fmtTok = n => n==null?'—': n>=1e6 ? (n/1e6).toFixed(2)+'M' : n>=1e3 ? (n/1e3).toFixed(1)+'k' : ''+n;
const fmtMs = n => n==null?'—': n>=1000 ? (n/1000).toFixed(n>=10000?0:1)+'s' : Math.round(n)+'ms';
const fmtSize = n => n==null?'—': n>=1e6 ? (n/1e6).toFixed(1)+'MB' : n>=1024 ? (n/1024).toFixed(1)+'KB' : n+'B';
const fmtUSD = v => v==null?'—': v>=1?'$'+v.toFixed(2): v>=0.01?'$'+v.toFixed(3):'$'+v.toFixed(4);
const fmtDate = ms => { const d=new Date(ms); return d.toLocaleString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit',hour12:true,timeZone:'Asia/Kolkata'}); };
const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
// day keys are already IST calendar dates ('YYYY-MM-DD'); parse as UTC midnight and
// format in UTC so the label matches the IST bucket for viewers in any timezone.
const dmonth = s => new Date(s+'T00:00:00Z').toLocaleDateString('en-IN',{day:'2-digit',month:'short',timeZone:'UTC'});
const agoStr = ms => { if(!ms) return ''; let s=Math.max(0,(Date.now()-ms)/1000);
  if(s<90) return Math.round(s)+'s ago'; let v=s/60; if(v<90) return Math.round(v)+'m ago'; v/=60; if(v<36) return Math.round(v)+'h ago'; return Math.round(v/24)+'d ago'; };

if(LIBOK){
  Chart.defaults.color='#93a0bd';
  Chart.defaults.font.family='-apple-system,Segoe UI,Roboto,sans-serif';
  Chart.defaults.font.size=11.5;
  Chart.defaults.plugins.legend.labels.boxWidth=11;
  Chart.defaults.plugins.legend.labels.boxHeight=11;
  Chart.defaults.plugins.legend.labels.usePointStyle=true;
  Chart.defaults.plugins.tooltip.backgroundColor='#0b1020';
  Chart.defaults.plugins.tooltip.borderColor='#27314f';
  Chart.defaults.plugins.tooltip.borderWidth=1;
  Chart.defaults.plugins.tooltip.padding=10;
  Chart.defaults.scale.grid.color='rgba(39,49,79,.6)';
  Chart.defaults.scale.border.color='#27314f';
}
const GRID={color:'rgba(39,49,79,.6)'};
const charts={};
function chart(id,cfg){ const c=document.getElementById(id); if(!c||!LIBOK)return; if(charts[id])charts[id].destroy(); charts[id]=new Chart(c,cfg); }

function bar(id,labels,data,{horizontal=false,color=PAL[0],colors=null,fmtv=fmt,label='',stacked=false}={}){
  chart(id,{type:'bar',data:{labels,datasets:[{label,data,backgroundColor:colors||color,borderRadius:5,maxBarThickness:46}]},
    options:{indexAxis:horizontal?'y':'x',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+fmtv(c.parsed[horizontal?'x':'y'])}}},
      scales:{x:{grid:{display:horizontal,...GRID},ticks:{autoSkip:true,maxRotation:0,callback:function(v){const l=this.getLabelForValue(v);return horizontal?fmtv(v):(l&&l.length>14?l.slice(0,13)+'…':l)}}},
              y:{grid:{display:!horizontal,...GRID},beginAtZero:true,ticks:{callback:function(v){const l=this.getLabelForValue(v);return horizontal?(l&&l.length>22?l.slice(0,21)+'…':l):fmtv(v)}}}}}});
}
function doughnut(id,labels,data,{colors=PAL,fmtv=fmt}={}){
  chart(id,{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:colors,borderColor:'#151d36',borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'62%',
      plugins:{legend:{position:'right',labels:{padding:10}},tooltip:{callbacks:{label:c=>' '+c.label+': '+fmtv(c.parsed)}}}}});
}
function lineChart(id,labels,datasets,{fmtv=fmt}={}){
  chart(id,{type:'line',data:{labels,datasets:datasets.map((d,i)=>({tension:.32,borderWidth:2,pointRadius:3,pointHoverRadius:5,
    borderColor:d.color||PAL[i],backgroundColor:(d.fill?(d.color||PAL[i])+'22':'transparent'),fill:!!d.fill,...d}))},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:datasets.length>1,position:'top'},tooltip:{callbacks:{label:c=>' '+c.dataset.label+': '+fmtv(c.parsed.y)}}},
      scales:{x:{grid:GRID},y:{beginAtZero:true,grid:GRID,ticks:{callback:fmtv}}}}});
}

// ============================================================ scaffold
const TABS=[
  ['overview','Overview'],['activity','Activity'],['engagement','Engagement'],['users','Users'],['personas','Personas'],['queries','Queries'],
  ['conversations','Conversations'],['interactions','Interactions'],['tools','Tools'],
  ['performance','Performance'],['tokens','Tokens'],['outcomes','Outcomes & Reliability'],['quality','Quality / Eval']
];
let m=null;
const personaLabel = p => !p||p==='unclassified' ? 'Unclassified' : p.replace(/\b\w/g,c=>c.toUpperCase());
function applyChrome(){
  const ageMin = m.generated_at_ms ? (Date.now()-m.generated_at_ms)/60000 : null;
  const freshCol = ageMin==null ? 'var(--muted)' : (ageMin>75 ? 'var(--bad)' : 'var(--good)');
  const scopeTxt = m.scope==='all'
    ? `Users: <b>${m.users_with_data}</b> (incl. internal)`
    : `Users: <b>${m.users_with_data}</b> external${m.internal_users_excluded?` · <b>${m.internal_users_excluded}</b> internal hidden`:''}`;
  const filt=[];
  if(FILTERS.persona) filt.push(`persona: ${esc(personaLabel(FILTERS.persona))}`);
  if(filtersNarrowDates()) filt.push('date range');
  $('#scopeBar').innerHTML=
    `<div style="display:flex;align-items:center;gap:6px"><span class="dot" style="background:${freshCol}"></span>Data as of <b>${m.generated_at||'—'}</b>${m.generated_at_ms?` <span style="color:var(--muted2)">· ${agoStr(m.generated_at_ms)}</span>`:''}</div>`+
    `<div>${scopeTxt}</div>`+
    `<div>Conversations: <b>${fmt(m.filtered_threads)}</b></div>`+
    `<div>Turns: <b>${fmt(m.filtered_turns)}</b></div>`+
    `<div>${m.date_min||'—'} → ${m.date_max||'—'} <b>(${m.n_days}d)</b></div>`+
    `<div>${m.timezone}</div>`+
    (filt.length?`<div><span class="filterchip">⧩ filtered — ${filt.join(' · ')}</span></div>`:'');
  $('#footer').innerHTML=`Data as of <b>${m.generated_at||'—'}</b> · ${m.scope==='all'?('all '+m.users_with_data+' users incl. internal'):('external users only — '+(m.internal_users_excluded||0)+' internal excluded')} · ${m.filtered_turns} turns${filt.length?' (filters active: '+filt.join(', ')+')':''} · generated from ${fmt(m.total_turn_files)} archived turn files · all timestamps ${m.timezone}. Re-run <code>refresh.sh</code> to update.`;
}

const tabsEl=$('#tabs'), mainEl=$('#main');
TABS.forEach(([id,label],i)=>{
  const b=document.createElement('button'); b.className='tab'+(i===0?' active':''); b.textContent=label; b.dataset.t=id;
  b.onclick=()=>activate(id); tabsEl.appendChild(b);
  const p=document.createElement('section'); p.className='panel'+(i===0?' active':''); p.id='panel-'+id; mainEl.appendChild(p);
});
const rendered={};
let activeTab='overview';
function activate(id){
  activeTab=id;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.t===id));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==='panel-'+id));
  if(!rendered[id]){ (RENDER[id]||(()=>{}))(); rendered[id]=true; }
  // charts created while hidden may need resize
  setTimeout(()=>Object.values(charts).forEach(c=>{try{c.resize()}catch(e){}}),30);
}
function H(id,html){ document.getElementById('panel-'+id).innerHTML=html; }
function kpi(label,val,foot,cls=''){return `<div class="kpi ${cls}"><div class="bar"></div><div class="label">${label}</div><div class="val">${val}</div>${foot?`<div class="foot">${foot}</div>`:''}</div>`;}
function legend(items){return `<div class="legend">${items.map((x,i)=>`<span><span class="dot" style="background:${x.c||PAL[i]}"></span>${x.t}</span>`).join('')}</div>`;}

// shared turn-transcript renderer (used by Queries + Quality tabs)
const tItem=it=>{
  if(it.k==='reason') return `<div class="ti reason"><span class="lbl">🧠 reasoning</span><div class="body">${esc(it.t)}</div></div>`;
  if(it.k==='tool') return `<div class="ti tool"><span class="lbl">🔧 ${esc(it.name)}</span>${it.err?'<span class="meta" style="color:var(--bad)"> · error</span>':''}${it.in?`<div class="body">input <code>${esc(it.in)}</code></div>`:''}${it.out?`<div class="body">output <code>${esc(it.out)}</code></div>`:''}</div>`;
  if(it.k==='resp') return `<div class="ti resp"><span class="lbl">💬 response</span><div class="body">${esc(it.t)}</div></div>`;
  return '';
};
// st 1 = responses only; st 2 = also reasoning & tool calls
const transcriptHtml=(r,st)=>{
  const d=(r&&r.detail)||[];
  if(!d.length) return '<div class="empty-tr">No detail recorded for this turn.</div>';
  const resps=d.filter(it=>it.k==='resp'), rest=d.filter(it=>it.k!=='resp');
  let h = resps.length ? resps.map(tItem).join('') : '<div class="empty-tr">No text response in this turn.</div>';
  if(st>=2){ h += '<div class="tr-sep">Reasoning &amp; tool calls</div>'; h += rest.length ? rest.map(tItem).join('') : '<div class="empty-tr">No reasoning / tool calls.</div>'; }
  else if(rest.length){ h += '<div class="tr-more">▾ Click again to show reasoning &amp; tool calls</div>'; }
  return `<div class="transcript">${h}</div>`;
};
// attach the 3-state (closed → responses → +reasoning/tools) expand handler to a turn table
function wireTurnExpand(tbody,list){
  tbody.onclick=e=>{
    const row=e.target.closest('.qrow'); if(!row) return;
    const det=row.nextElementSibling; if(!det||!det.classList.contains('qdetail')) return;
    let st=((+row.dataset.st)||0)+1; if(st>2) st=0;
    row.dataset.st=st; row.classList.toggle('open', st>0);
    if(st===0){ det.style.display='none'; det.firstElementChild.innerHTML=''; }
    else { det.style.display=''; det.firstElementChild.innerHTML=transcriptHtml(list[+row.dataset.i], st); }
  };
}

// ---- global filters: scope (external/all) × date range × persona ------------
// Every metric on the dashboard is recomputed from the raw turns whenever any
// of these change (buildData in assets/dashboard_calc.js).
let curScope='external', allLoading=false, scopeToggle=null;
const FILTERS={ persona:'', from:null, to:null };   // dates as 'YYYY-MM-DD' (IST)
const IST_OFF=19800000;
const todayIST=()=>new Date(Date.now()+IST_OFF).toISOString().slice(0,10);
const istDayStartMs=d=>Date.parse(d+'T00:00:00Z')-IST_OFF;
const istDayEndMs=d=>istDayStartMs(d)+86399999;
function currentRaw(){ return curScope==='all' ? window.DASHBOARD_DATA_ALL : window.DASHBOARD_DATA; }
function personaOf(raw,uid){ return ((raw.ident[uid]||{}).persona)||'unclassified'; }
function filtersNarrowDates(){
  const raw=currentRaw();
  return (FILTERS.from && raw.meta.date_min && FILTERS.from>raw.meta.date_min)
      || (FILTERS.to && raw.meta.date_max && FILTERS.to<raw.meta.date_max);
}
function recompute(){
  const raw=currentRaw();
  let ts=raw.turns;
  // Only filter when a bound actually narrows the full range — at the default
  // (from=beginning, to=now) this is a true no-op, so the default view matches
  // unfiltered aggregation exactly (incl. any turns with a missing timestamp).
  if(FILTERS.from && raw.meta.date_min && FILTERS.from>raw.meta.date_min){ const f=istDayStartMs(FILTERS.from); ts=ts.filter(t=>t.ts_ms>=f); }
  if(FILTERS.to && raw.meta.date_max && FILTERS.to<raw.meta.date_max){ const e=istDayEndMs(FILTERS.to); ts=ts.filter(t=>t.ts_ms<=e); }
  if(FILTERS.persona) ts=ts.filter(t=>personaOf(raw,t.user_id)===FILTERS.persona);
  D=window.KyroCalc.buildData(raw,ts);
  m=D.meta;
  applyChrome();
  Object.keys(charts).forEach(k=>{ try{charts[k].destroy()}catch(e){} delete charts[k]; });
  Object.keys(rendered).forEach(k=>delete rendered[k]);
  activate(activeTab);
}

// ---- filter bar (date range + persona) --------------------------------------
function personaOptions(raw){
  const counts=new Map();
  for(const uid of new Set(raw.turns.map(t=>t.user_id))){
    const p=personaOf(raw,uid);
    counts.set(p,(counts.get(p)||0)+1);
  }
  // most users first, Unclassified pinned last
  return [...counts.entries()].sort((a,b)=>
    (a[0]==='unclassified')-(b[0]==='unclassified') || b[1]-a[1]);
}
function buildFilterBar(){
  const bar=document.createElement('div'); bar.className='filters'; bar.id='filterBar';
  bar.innerHTML=
    `<label title="Metrics include turns from this IST date onward">From <input type="date" id="f-from"></label>`+
    `<label title="Metrics include turns up to end of this IST date">To <input type="date" id="f-to"></label>`+
    `<label title="Only include users with this primary trading persona">Persona <select id="f-persona"></select></label>`+
    `<button id="f-reset" title="Reset to full date range + all personas">Reset</button>`;
  document.querySelector('.topbar').insertBefore(bar,scopeToggle||$('#scopeBar'));
  $('#f-from').onchange=e=>{ FILTERS.from=e.target.value||null;
    const to=$('#f-to'); if(to.value&&e.target.value&&to.value<e.target.value){to.value=e.target.value;FILTERS.to=to.value;} recompute(); };
  $('#f-to').onchange=e=>{ FILTERS.to=e.target.value||null;
    const fr=$('#f-from'); if(fr.value&&e.target.value&&e.target.value<fr.value){fr.value=e.target.value;FILTERS.from=fr.value;} recompute(); };
  $('#f-persona').onchange=e=>{ FILTERS.persona=e.target.value; recompute(); };
  $('#f-reset').onclick=()=>{ const raw=currentRaw();
    FILTERS.persona=''; FILTERS.from=raw.meta.date_min; FILTERS.to=todayIST();
    initFilterControls(); recompute(); };
  // defaults: start = beginning of the data, end = now
  FILTERS.from=currentRaw().meta.date_min; FILTERS.to=todayIST();
  initFilterControls();
}
function initFilterControls(){
  const raw=currentRaw();
  const from=$('#f-from'), to=$('#f-to'), sel=$('#f-persona');
  const tmax=todayIST();
  from.min=raw.meta.date_min||''; from.max=tmax;
  to.min=raw.meta.date_min||'';   to.max=tmax;
  from.value=FILTERS.from||raw.meta.date_min||''; to.value=FILTERS.to||tmax;
  FILTERS.from=from.value||null; FILTERS.to=to.value||null;
  const opts=personaOptions(raw);
  if(FILTERS.persona && !opts.some(([p])=>p===FILTERS.persona)) FILTERS.persona='';
  sel.innerHTML=`<option value="">All personas</option>`+
    opts.map(([p,c])=>`<option value="${esc(p)}"${FILTERS.persona===p?' selected':''}>${esc(personaLabel(p))} (${c})</option>`).join('');
}

// ---- scope toggle: External (default) <-> All users (incl. internal, lazy-loaded)
function buildScopeToggle(){
  if(!(RAW.meta&&RAW.meta.has_all_scope)) return;   // only the external file advertises the toggle
  scopeToggle=document.createElement('div'); scopeToggle.className='scopetoggle';
  scopeToggle.innerHTML=`<button data-s="external" class="on" title="External users only">External</button>`+
    `<button data-s="all" title="Include internal users (loads a large data file on first use)">All + internal</button>`;
  document.querySelector('.topbar').insertBefore(scopeToggle,$('#scopeBar'));
  scopeToggle.querySelectorAll('button').forEach(b=>b.onclick=()=>setScope(b.dataset.s));
}

// ---- download the raw data file for the active scope --------------------------
function saveBlob(name, text){
  const url=URL.createObjectURL(new Blob([text],{type:'application/javascript'}));
  const a=document.createElement('a'); a.href=url; a.download=name;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
async function downloadData(){
  const all=curScope==='all';
  const file=all?'dashboard_data_all.js':'dashboard_data.js';
  const varname=all?'DASHBOARD_DATA_ALL':'DASHBOARD_DATA';
  const btn=$('#dlBtn'); const label=btn.textContent; btn.disabled=true; btn.textContent='Preparing…';
  try{
    // Prefer the exact on-disk bytes (works when served over HTTP)…
    const r=await fetch(file,{cache:'no-store'});
    if(!r.ok) throw new Error('http '+r.status);
    saveBlob(file, await r.text());
  }catch(_){
    // …fall back to reconstructing from the in-memory object (file:// / offline).
    const obj=all?window.DASHBOARD_DATA_ALL:window.DASHBOARD_DATA;
    if(!obj){ alert('Data for this scope is not loaded yet.'); }
    else saveBlob(file, '// Auto-generated by build_dashboard.py — do not edit by hand.\nwindow.'+varname+' = '+JSON.stringify(obj)+';\n');
  }finally{ btn.disabled=false; btn.textContent=label; }
}
function setScope(s){
  if(s===curScope || allLoading) return;
  if(s==='all' && !window.DASHBOARD_DATA_ALL){
    allLoading=true; setScopeButtons('all');
    $('#scopeBar').innerHTML='<div><span class="dot" style="background:var(--warn)"></span> Loading all-users data…</div>';
    const sc=document.createElement('script'); sc.src='dashboard_data_all.js';
    sc.onload=()=>{ allLoading=false; swapTo('all'); };
    sc.onerror=()=>{ allLoading=false; setScopeButtons('external'); applyChrome();
      alert('Could not load dashboard_data_all.js — run: python3 build_dashboard.py'); };
    document.head.appendChild(sc); return;
  }
  swapTo(s);
}
function swapTo(s){
  const oldMin=currentRaw().meta.date_min;
  curScope=s; setScopeButtons(s);
  // still at "beginning of data"? follow the new scope's beginning (the all-users
  // archive starts earlier than external-only) instead of silently cutting turns
  if(FILTERS.from===oldMin) FILTERS.from=currentRaw().meta.date_min;
  initFilterControls();     // persona counts + date bounds differ per scope
  recompute();
}

   <div class="card"><h3>Persona breakdown</h3><p class="desc">Click a column header to sort</p>
     <div class="scroll"><table id="pe-table"><thead><tr>
       <th data-k="persona" data-t="s">Persona</th>
       <th class="num" data-k="users">Users</th><th class="num" data-k="turns">Turns</th>
       <th class="num" data-k="threads">Convos</th><th class="num" data-k="turns_per_user">Turns/user</th>
       <th class="num" data-k="active_days">Active days</th>
       <th class="num" data-k="tokens">Tokens</th><th class="num" data-k="tokens_per_user">Tok/user</th>
       <th class="num" data-k="tool_calls">Tools</th><th class="num" data-k="errors">Errs</th>
       <th class="num" data-k="cancelled">Canc</th><th class="num" data-k="negative">Neg. queries</th>
       <th class="num" data-k="flagged">Flagged</th><th class="num" data-k="flag_per100">Flags/100</th>
       <th class="num" data-k="avg_latency_ms">Avg time</th><th class="num" data-k="p90_latency_ms">p90 time</th>
       <th data-k="top_intent" data-t="s">Top intent</th>
     </tr></thead><tbody></tbody></table></div></div>`);
  const labs=t.map(x=>personaLabel(x.persona));
  doughnut('pe-users',labs,t.map(x=>x.users));
  bar('pe-turns',labs,t.map(x=>x.turns),{horizontal:true,colors:t.map((_,i)=>PAL[i%PAL.length])});
  bar('pe-depth',labs,t.map(x=>x.turns_per_user),{horizontal:true,color:PAL[1],fmtv:v=>(+v).toFixed(1)});
  bar('pe-flags',labs,t.map(x=>x.flag_per100),{horizontal:true,color:PAL[9],fmtv:v=>v+'/100'});
  // intent mix — stacked % bars, top 8 named intents overall. The real "Other"
  // intent (classifier fallback) is folded into the synthetic long-tail bucket so
  // the two never collide as duplicate legend entries.
  const intentTot=new Map();
  t.forEach(x=>x.intents.forEach(i=>intentTot.set(i.intent,(intentTot.get(i.intent)||0)+i.count)));
  const topIntents=[...intentTot.entries()].filter(([k])=>k!=='Other').sort((a,b)=>b[1]-a[1]).slice(0,8).map(([k])=>k);
  const ds=topIntents.map((intent,i)=>({label:intent,backgroundColor:PAL[i%PAL.length],stack:'s',
    data:t.map(x=>{const c=(x.intents.find(z=>z.intent===intent)||{}).count||0;return x.turns?+(c/x.turns*100).toFixed(1):0;})}));
  ds.push({label:'Other / long tail',backgroundColor:'#4b5878',stack:'s',
    data:t.map(x=>{const c=x.intents.filter(z=>!topIntents.includes(z.intent)).reduce((a,z)=>a+z.count,0);return x.turns?+(c/x.turns*100).toFixed(1):0;})});
  chart('pe-intent',{type:'bar',data:{labels:labs,datasets:ds},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'top'},tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${c.parsed.x}%`}}},
      scales:{x:{stacked:true,grid:GRID,max:100,ticks:{callback:v=>v+'%'}},y:{stacked:true,grid:{display:false}}}}});
  // sortable table
  const tb=$('#pe-table tbody'); let sK='turns',sD=-1;
  const draw=()=>{
    const rows=[...t].sort((a,b)=>(typeof a[sK]==='string'?a[sK].localeCompare(b[sK]):a[sK]-b[sK])*sD);
    tb.innerHTML=rows.map(r=>`<tr>
      <td><span class="tag"${r.persona==='unclassified'?' style="opacity:.6"':''}>${esc(personaLabel(r.persona))}</span></td>
      <td class="num">${fmt(r.users)}</td><td class="num">${fmt(r.turns)}</td>
      <td class="num">${fmt(r.threads)}</td><td class="num">${r.turns_per_user}</td>
      <td class="num">${r.active_days}<span style="color:var(--muted2)"> / ${m.n_days}</span></td>
      <td class="num">${fmtTok(r.tokens)}</td><td class="num">${fmtTok(r.tokens_per_user)}</td>
      <td class="num">${fmt(r.tool_calls)}</td>
      <td class="num">${r.errors?'<span style="color:var(--bad)">'+r.errors+'</span>':0}</td>
      <td class="num">${r.cancelled||0}</td><td class="num">${r.negative||0}</td>
      <td class="num">${r.flagged?'<span style="color:var(--bad)">'+r.flagged+'</span>':0}</td>
      <td class="num">${r.flag_per100}</td>
      <td class="num">${fmtMs(r.avg_latency_ms)}</td><td class="num">${fmtMs(r.p90_latency_ms)}</td>
      <td><span class="tag">${esc(r.top_intent)}</span></td></tr>`).join('');
  };
  draw();
  $('#pe-table thead').querySelectorAll('th').forEach(th=>th.onclick=()=>{
    const k=th.dataset.k; if(k===sK)sD*=-1; else{sK=k;sD=th.dataset.t==='s'?1:-1;} draw();
  });
};

     <input class="filterbox" id="qfilter" placeholder="Filter queries, users, intents…">
     <div class="scroll"><table id="qall"><thead><tr><th style="width:22px"></th><th>When (IST)</th><th>User</th><th>User ID</th><th>Thread ID</th><th>Intent</th><th>Query</th><th class="num">Tools</th><th>Outcome</th></tr></thead><tbody></tbody></table></div></div>`);
  doughnut('q-intent',q.intents.map(i=>i.intent),q.intents.map(i=>i.count));
  bar('q-len',q.length_hist.map(x=>x.label),q.length_hist.map(x=>x.count),{color:PAL[4]});

  if(typeof WordCloud!=='undefined' && q.wordcloud.length){
    const cv=$('#wc'); const w=cv.parentElement.clientWidth-4; cv.width=w; cv.height=380;
    const max=Math.max(...q.wordcloud.map(x=>x[1]));
    WordCloud(cv,{list:q.wordcloud,gridSize:7,weightFactor:n=>8+Math.sqrt(n/max)*52,
      fontFamily:'-apple-system,Segoe UI,sans-serif',color:(w,wt)=>PAL[Math.floor(Math.random()*PAL.length)],
      backgroundColor:'transparent',rotateRatio:.35,rotationSteps:2,minSize:9,shrinkToFit:true,drawOutOfBound:false});
  } else { $('#wc').outerHTML='<div class="empty">word cloud unavailable</div>'; }
  // all queries table — filterable, each row expands to its reasoning/tool/response transcript
  // (tItem / transcriptHtml are shared globals — see top of script)
  const tb=$('#qall tbody');
  const all=[...q.all].sort((a,b)=>b.ts_ms-a.ts_ms);
  const rowsHtml=(r,i)=>`<tr class="qrow" data-i="${i}"><td><span class="caret">▸</span></td><td>${fmtDate(r.ts_ms)}</td><td>${esc(r.user)}</td><td class="uid">${esc(r.user_id||'')}</td><td class="uid">${esc(r.thread||'')}</td><td><span class="tag">${esc(r.intent)}</span></td><td class="qtext">${esc(r.text)}</td><td class="num">${r.n_tools}</td><td><span class="pill ${r.outcome}">${r.outcome}</span></td></tr>`+
    `<tr class="qdetail" style="display:none"><td colspan="9"></td></tr>`;
  const drawQ=f=>{ const ff=f.toLowerCase();
    const rows=all.map((r,i)=>[r,i]).filter(([r])=>!ff||(r.text+r.user+(r.user_id||'')+(r.thread||'')+r.intent).toLowerCase().includes(ff));
    tb.innerHTML=rows.length?rows.map(([r,i])=>rowsHtml(r,i)).join(''):'<tr><td class="empty" colspan=9>no match</td></tr>'; };
  drawQ(''); $('#qfilter').oninput=e=>drawQ(e.target.value);
  tb.onclick=e=>{
    const row=e.target.closest('.qrow'); if(!row) return;
    const det=row.nextElementSibling; if(!det||!det.classList.contains('qdetail')) return;
    let st=((+row.dataset.st)||0)+1; if(st>2) st=0;
    row.dataset.st=st; row.classList.toggle('open', st>0);
    if(st===0){ det.style.display='none'; det.firstElementChild.innerHTML=''; }
    else { det.style.display=''; det.firstElementChild.innerHTML=transcriptHtml(all[+row.dataset.i], st); }
  };
};

    ).join('')+`</div>`; };
  const samp=r=>r.samples.length?r.samples.map(s=>'• '+esc(s)).join('<br>'):'<span style="color:var(--muted2)">—</span>';
  const rowH=(r,i)=>`<tr class="qrow" data-i="${i}"><td><span class="caret">▸</span></td>

    <tr class="qdetail" style="display:none"><td colspan="7"></td></tr>`;
  const drawT=f2=>{ const ff=(f2||'').toLowerCase();
    cur=[...c.threads_table]
      .filter(r=>!ff||((r.name||'')+r.user_id+r.thread_id+r.samples.join(' ')).toLowerCase().includes(ff))
      .sort((a,b)=>(typeof a[tsK]==='string'?(a[tsK]||'').localeCompare(b[tsK]||''):((a[tsK]||0)-(b[tsK]||0)))*tsD);

  drawT('');
  $('#cvfilter').oninput=e=>drawT(e.target.value);
  $('#cv-threads thead').querySelectorAll('th').forEach(th=>{ if(!th.dataset.k)return;
    th.onclick=()=>{const k=th.dataset.k; if(k===tsK)tsD*=-1; else{tsK=k;tsD=th.dataset.t==='s'?1:-1;} drawT($('#cvfilter').value);};});
  tt.onclick=e=>{ const row=e.target.closest('.qrow'); if(!row)return;
    const det=row.nextElementSibling; if(!det||!det.classList.contains('qdetail'))return;
    const open=row.classList.toggle('open');
    if(!open){ det.style.display='none'; det.firstElementChild.innerHTML=''; }

};

// human-readable names for the automated eval rules (codes live in eval_checks.py)
const RULE_LABELS={
  STALE_AS_LIVE:'Stale data narrated as live',
  PNL_WRONG_DATE:'P&L queried for the wrong date',
  DEDUP_RETRY_AFTER_ERROR:'Duplicate re-issue of a call that errored',
  DEDUP_RETRY_AFTER_SUCCESS:'Duplicate re-issue of a call that succeeded',
  TOOL_PARAM_ERROR:'Malformed tool call (bad parameters)',
  TOOL_ERROR_THEN_RECOVERED:'Tool errored, then succeeded on a corrected retry',
  EMPTY_ERRORED_TURN:'Errored turn with no reply',
  LEAKED_TOOL_SYNTAX:'Tool syntax leaked into reply',
  LATEX_LEAK:'Raw LaTeX shown in reply',
  DUP_TEXT_BLOCK:'Same paragraph repeated in reply',
  OVER_BUDGET_LATENCY:'Turn over the latency budget',
  ASKUSER_TIMEOUT_THEN_ACTION:'Acted after unanswered confirmation',
  SUCCESS_ON_FAILURE:'Claimed success on a failed action',
  TOPN_CAP:'Results capped without disclosure',
  GREEKS_NO_SOURCE:'Greeks shown without source data',
  NUMBER_NOT_GROUNDED:'Numbers not grounded in tool data',
  NUMBER_UNGROUNDED_NO_FETCH:'Numbers quoted with no tool source in the thread',
  SUM_NE_TOTAL:'Table total ≠ sum of its rows',
  SR_LEVEL_NOT_IN_DATA:'Support/resistance level not in data',
};
const ruleLabel=r=>RULE_LABELS[r]||(r||'').replace(/_/g,' ').toLowerCase().replace(/^\w/,c=>c.toUpperCase());

  const sevCol={high:'var(--bad)',medium:'var(--warn)',low:'var(--muted)'};
  const sevPill=s=>`<span class="pill" style="background:${s==='high'?'rgba(248,113,113,.15)':s==='medium'?'rgba(251,191,36,.15)':'rgba(147,160,189,.15)'};color:${sevCol[s]}">${s}</span>`;
  const tierPill=t=>`<span class="tag" style="color:${t==='A'?'var(--good)':'var(--accent2)'}">Tier ${t}</span>`;
  const all=[...D.queries.all].filter(r=>r.violations&&r.violations.length).sort((a,b)=>b.ts_ms-a.ts_ms);
  const aTurns=all.filter(r=>r.violations.some(x=>x.tier==='A'));
  const bTurns=all.filter(r=>r.violations.some(x=>x.tier==='B'));
  H('quality',`
   <div class="note">Automated eval pass over every turn — no LLM, all checks run from the archived turn JSON in <code>eval_checks.py</code>. <b>Tier A</b> rules are deterministic (high-precision) and counted as confirmed defects. <b>Tier B</b> rules are heuristic and shown as a <b>review queue</b> — candidates to confirm/dismiss, not counted in the headline. Click any turn row to read its full transcript.</div>
   <div class="grid g4" style="margin-bottom:16px">
     ${kpi('Turns analysed',fmt(Q.total_turns),m.scope==='all'?'all users':'external only')}
     ${kpi('Clean turns',Q.total_turns?Q.clean_pct+'%':'N/A',Q.total_turns?`${fmt(Q.total_turns-Q.flagged_turns)} of ${fmt(Q.total_turns)}`:'no turns in range',Q.total_turns&&Q.clean_pct<80?'warn':'')}
     ${kpi('Flagged · Tier A',fmt(Q.flagged_turns),'≥1 confirmed rule',Q.flagged_turns?'bad':'')}
     ${kpi('Review queue · Tier B',fmt(Q.tierB_candidate_turns),'heuristic candidates','cy')}
     ${kpi('High severity',fmt(Q.severity.high),'Tier-A high hits',Q.severity.high?'bad':'')}
     ${kpi('Medium severity',fmt(Q.severity.medium),'Tier-A medium','warn')}
     ${kpi('Low severity',fmt(Q.severity.low),'Tier-A low')}
     ${kpi('Rules firing',Q.by_rule.length,'distinct checks','pp')}
   </div>
   <div class="grid g2" style="margin-bottom:16px">
     <div class="card"><h3>Flagged turns by dimension (Tier A)</h3><p class="desc">Confirmed defects grouped by evaluation dimension</p><div class="chart-wrap tall"><canvas id="ql-dim"></canvas></div></div>
     <div class="card"><h3>Quality trend (IST)</h3><p class="desc">Line = % of that day's turns clean — hover for raw counts · watch this rise as fixes ship</p><div class="chart-wrap tall"><canvas id="ql-trend"></canvas></div></div>
   </div>
   <div class="card" style="margin-bottom:16px"><h3>Rules firing</h3><p class="desc">Every automated check · count = turns where it fired · % of ${fmt(Q.total_turns)} turns · hover a rule for its internal code</p>
     <div class="scroll"><table><thead><tr><th>Rule</th><th>Tier</th><th>Severity</th><th>Dimension</th><th class="num">Turns</th><th class="num">%</th></tr></thead><tbody>
     ${Q.by_rule.map(r=>`<tr><td title="${esc(r.rule)}" style="cursor:help"><b>${esc(ruleLabel(r.rule))}</b></td><td>${tierPill(r.tier)}</td><td>${sevPill(r.severity)}</td><td style="color:var(--muted)">${esc(r.dim)}</td><td class="num">${r.count}</td><td class="num">${(r.count/Q.total_turns*100).toFixed(1)}%</td></tr>`).join('')}
     </tbody></table></div></div>
   <div class="grid g2" style="margin-bottom:16px">
     <div class="card"><h3>Flag rate by user (Tier A)</h3><p class="desc">Which users hit the worst experience · flagged turns / 100 turns</p>
       <div class="scroll" style="max-height:340px"><table><thead><tr><th>User</th><th>User ID</th><th class="num">Turns</th><th class="num">Flagged</th><th class="num">/100</th></tr></thead><tbody>
       ${Q.by_user.filter(u=>u.turns>0).map(u=>`<tr><td>${esc(u.name||(u.user_id||'').slice(0,8))}</td><td class="uid">${esc(u.user_id||'')}</td><td class="num">${u.turns}</td><td class="num">${u.flags?'<span style="color:var(--bad)">'+u.flags+'</span>':0}</td><td class="num">${u.per100}</td></tr>`).join('')}
       </tbody></table></div></div>
     <div class="card"><h3>Tier-B review queue by dimension</h3><p class="desc">Heuristic candidates awaiting confirm/dismiss</p>
       ${Q.by_dimension_tierB.length?`<div class="chart-wrap"><canvas id="ql-dimb"></canvas></div>`:'<div class="empty">No Tier-B candidates in this dataset.</div>'}</div>
   </div>
   <div class="card" style="margin-bottom:16px"><h3>Flagged turns — Tier A (${aTurns.length})</h3><p class="desc">Click a row to expand the full turn transcript · hover a rule chip for its evidence</p>
     <input class="filterbox" id="qlfilter" placeholder="Filter by rule, dimension, user, user id, query…">
     <div class="scroll"><table id="ql-flagged"><thead><tr><th style="width:22px"></th><th>When (IST)</th><th>User</th><th>User ID</th><th>Thread ID</th><th>Rules fired</th><th>Query</th></tr></thead><tbody></tbody></table></div></div>
   <div class="card"><h3>Review queue — Tier B (${bTurns.length})</h3><p class="desc">Heuristic candidates — read the turn, then confirm (real) or dismiss (false positive)</p>
     <div class="scroll"><table id="ql-review"><thead><tr><th style="width:22px"></th><th>When (IST)</th><th>User</th><th>User ID</th><th>Thread ID</th><th>Candidate rules</th><th>Evidence</th></tr></thead><tbody></tbody></table></div></div>
  `);
  bar('ql-dim',Q.by_dimension.map(d=>d.dimension),Q.by_dimension.map(d=>d.count),{horizontal:true,colors:Q.by_dimension.map((_,i)=>PAL[i%PAL.length])});
  if(Q.by_dimension_tierB.length) bar('ql-dimb',Q.by_dimension_tierB.map(d=>d.dimension),Q.by_dimension_tierB.map(d=>d.count),{horizontal:true,color:PAL[1]});
  const bd=Q.by_day;
  chart('ql-trend',{type:'line',data:{labels:bd.map(d=>dmonth(d.date)),datasets:[
     {label:'Clean % of turns',data:bd.map(d=>d.turns?+((d.turns-d.flagged)/d.turns*100).toFixed(1):0),borderColor:PAL[0],backgroundColor:'rgba(54,211,153,.12)',fill:true,tension:.3,borderWidth:2,pointRadius:2,pointHoverRadius:4}
   ]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
     plugins:{legend:{position:'top'},tooltip:{callbacks:{label:c=>{const d=bd[c.dataIndex];return ` ${c.parsed.y}% clean · ${d.turns-d.flagged} of ${d.turns} turns`;}}}},
     scales:{x:{grid:GRID},y:{beginAtZero:true,max:100,grid:GRID,ticks:{callback:v=>v+'%'}}}}});
  const ruleChips=(vs,tier)=>vs.filter(x=>x.tier===tier).map(x=>`<span class="tag" title="${esc(x.rule)} · ${esc(x.dim)} — ${esc(x.evidence)}" style="color:${sevCol[x.severity]};cursor:help">${esc(ruleLabel(x.rule))}</span>`).join(' ');
  const tbA=$('#ql-flagged tbody');
  const rowA=(r,i)=>`<tr class="qrow" data-i="${i}"><td><span class="caret">▸</span></td><td>${fmtDate(r.ts_ms)}</td><td>${esc(r.user)}</td><td class="uid">${esc(r.user_id||'')}</td><td class="uid">${esc(r.thread||'')}</td><td style="white-space:normal;max-width:340px">${ruleChips(r.violations,'A')}</td><td class="qtext">${esc(r.text)}</td></tr><tr class="qdetail" style="display:none"><td colspan="7"></td></tr>`;
  const drawA=f=>{const ff=f.toLowerCase();
    const rows=aTurns.map((r,i)=>[r,i]).filter(([r])=>!ff||(r.text+r.user+(r.user_id||'')+(r.thread||'')+r.violations.map(x=>x.rule+' '+ruleLabel(x.rule)+' '+x.dim).join(' ')).toLowerCase().includes(ff));
    tbA.innerHTML=rows.length?rows.map(([r,i])=>rowA(r,i)).join(''):'<tr><td class="empty" colspan=7>no match</td></tr>';};
  drawA(''); $('#qlfilter').oninput=e=>drawA(e.target.value);
  wireTurnExpand(tbA,aTurns);
  const tbB=$('#ql-review tbody');
  const rowB=(r,i)=>`<tr class="qrow" data-i="${i}"><td><span class="caret">▸</span></td><td>${fmtDate(r.ts_ms)}</td><td>${esc(r.user)}</td><td class="uid">${esc(r.user_id||'')}</td><td class="uid">${esc(r.thread||'')}</td><td style="white-space:normal;max-width:240px">${ruleChips(r.violations,'B')}</td><td class="qtext">${esc(r.violations.filter(x=>x.tier==='B').map(x=>x.evidence).join(' · '))}</td></tr><tr class="qdetail" style="display:none"><td colspan="7"></td></tr>`;
  tbB.innerHTML=bTurns.length?bTurns.map((r,i)=>rowB(r,i)).join(''):'<tr><td class="empty" colspan=7>No Tier-B candidates.</td></tr>';
  wireTurnExpand(tbB,bTurns);
};

// boot
if(RAW && CALCOK){ buildScopeToggle(); buildFilterBar(); recompute(); }
{ const _dl=$('#dlBtn'); if(_dl){ if(RAW && CALCOK) _dl.onclick=downloadData; else _dl.style.display='none'; } }
if(!LIBOK){ document.querySelectorAll('.chart-wrap,.wc').forEach(e=>e.innerHTML='<div class="empty">Chart library not loaded — open via the local server (run.sh) or check assets/.</div>'); }
</script>
</body>
</html>
